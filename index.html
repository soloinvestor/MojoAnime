<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MojoAnime</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="header">
  <div class="flex">

    <div class="left">
      <div id="menu-btn" class="fas fa-bars-staggered"></div>
      <a href="index.html" class="logo">MojoAnime</a>
    </div>

    <div class="search-form">
      <form class="search-bar">
        <input type="search" class="box" placeholder="Search anime...">
        <label class="fas fa-search"></label>
      </form>
    </div>

    <a href="login.html" class="btn">
      <i class="fas fa-user"></i> Login
    </a>

  </div>
</header>

<!-- ================= SIDEBAR ================= -->
<div class="side-bar">
   <nav class="navbar">
      <div id="close-btn"><i class="fas fa-angle-left"></i> Close</div>
      <a href="index.html">Home</a>
   </nav>
</div>

<!-- ================= HERO ================= -->
<div class="hero">
   <div class="hero-slider swiper">
      <div class="swiper-wrapper">

         <div class="slide swiper-slide" style="background:url('images/hero-1.jpg') center/cover no-repeat">
            <section class="content">
               <div>
                  <span>#1 Trending</span>
                  <h3>Demon Slayer</h3>

                  <div class="buttons">
                     <a href="watch.html" class="btn">
                        <i class="fas fa-play"></i> Watch Now
                     </a>
                  </div>

               </div>
            </section>
         </div>

      </div>
   </div>
</div>

<!-- ================= DYNAMIC ANIME SECTION ================= -->
<section class="latest">

   <h1 class="heading">Latest Anime</h1>

   <!-- IMPORTANT: JS WILL FILL THIS -->
   <div class="posts-container"></div>

</section>

<!-- ================= SCRIPTS ================= -->
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="js/script.js"></script>

</body>
</html>
